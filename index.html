<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/styles.css" />

    <title>Frontend Mentor | Fylo data storage component</title>
  </head>
  <body>
    <main>
      <div class="title-card">
        <div class="card-content">
          <div class="logo"><img src="/images/logo.svg" alt="logo" /></div>
          <div class="icons">
            <div class="icon-box">
              <img src="/images/icon-document.svg" alt="document icon" />
            </div>
            <div class="icon-box">
              <img src="/images/icon-folder.svg" alt="folder icon" />
            </div>
            <div class="icon-box">
              <img src="/images/icon-upload.svg" alt="upload icon" />
            </div>
          </div>
        </div>
      </div>

      <div class="storage-card">
        <div class="card-content">
          <h1 class="storage-text">
            You’ve used <span>815 GB</span> of your storage
          </h1>

          <div class="progress-bar">
            <div class="progress-fill">
              <span class="progress-dot"></span>
            </div>
          </div>

          <div class="labels">
            <span>0 GB</span>
            <span>1000 GB</span>
          </div>

          <div class="storage-left">
            <span class="amount">185</span>
            <span class="unit">GB LEFT</span>
          </div>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Kofi Baafi Kwatia</a>.
    </footer>
  </body>
</html>
